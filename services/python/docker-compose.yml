services:
  python-sidecar:
    build:
      context: .
      dockerfile: Dockerfile
    image: zeniipo/python-sidecar:dev
    container_name: zeniipo-python-sidecar
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      ENVIRONMENT: dev
      LOG_LEVEL: DEBUG
    volumes:
      - ./src:/app/src:ro   # hot-reload friendly during dev
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
